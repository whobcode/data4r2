<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>data4r2 — R2 Storage</title>
<style>
  :root { --bg:#0b0f17; --panel:#141a26; --panel2:#1c2433; --line:#263041; --text:#e6ebf2; --muted:#8b98ad; --accent:#5b8cff; --green:#34d399; --red:#f87171; }
  * { box-sizing:border-box; }
  body { margin:0; background:radial-gradient(1200px 600px at 50% -10%,#18233a 0%,var(--bg) 60%); color:var(--text); font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; min-height:100vh; }
  .wrap { max-width:980px; margin:0 auto; padding:32px 20px 80px; }
  h1 { font-size:26px; margin:0 0 2px; } h1 .r2 { color:var(--accent); }
  p.sub { color:var(--muted); margin:0 0 22px; }
  .card { background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:18px; margin-bottom:18px; }
  .card h2 { font-size:13px; text-transform:uppercase; letter-spacing:.06em; color:var(--muted); margin:0 0 12px; }
  .drop { border:1.5px dashed var(--line); border-radius:12px; padding:22px; text-align:center; cursor:pointer; background:var(--panel2); transition:.15s; }
  .drop.drag { border-color:var(--accent); background:#18223a; }
  .row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
  input[type=text] { flex:1; min-width:160px; background:var(--panel2); border:1px solid var(--line); color:var(--text); border-radius:9px; padding:9px 12px; font-size:14px; }
  button { background:var(--accent); color:#fff; border:0; border-radius:9px; padding:9px 15px; font-size:14px; font-weight:600; cursor:pointer; }
  button:hover { filter:brightness(1.08); } button.ghost { background:var(--panel2); border:1px solid var(--line); color:var(--text); }
  button.danger { background:transparent; color:var(--red); border:1px solid #5a2a2a; padding:5px 9px; font-size:12px; }
  button.mini { background:var(--panel2); border:1px solid var(--line); color:var(--text); padding:5px 9px; font-size:12px; }
  .status { color:var(--muted); font-size:13px; margin-top:8px; min-height:18px; }
  table { width:100%; border-collapse:collapse; font-size:14px; }
  th { text-align:left; color:var(--muted); font-weight:600; font-size:12px; text-transform:uppercase; letter-spacing:.04em; padding:6px 8px; border-bottom:1px solid var(--line); }
  td { padding:8px; border-bottom:1px solid var(--line); vertical-align:middle; }
  td.key { font-family:ui-monospace,Menlo,monospace; word-break:break-all; }
  .muted { color:var(--muted); } .nowrap { white-space:nowrap; }
  .empty { color:var(--muted); text-align:center; padding:24px; }
  a { color:var(--accent); text-decoration:none; }
</style>
</head>
<body>
<div class="wrap">
  <h1>data<span class="r2">4r2</span></h1>
  <p class="sub">Cloudflare R2 object storage — browse, upload, download, and import models straight from HuggingFace.</p>

  <div class="card">
    <h2>Upload a file</h2>
    <div id="drop" class="drop"><strong>Drop a file</strong> or click to choose — streamed directly to R2</div>
    <input id="fileInput" type="file" hidden />
    <div class="status" id="upStatus"></div>
  </div>

  <div class="card">
    <h2>Import from HuggingFace → R2</h2>
    <div class="row">
      <input id="hfUrl" type="text" placeholder="https://huggingface.co/.../resolve/main/model.safetensors" />
      <input id="r2Path" type="text" placeholder="r2/destination/path.safetensors" style="flex:.7" />
      <button id="transferBtn">Queue transfer</button>
    </div>
    <div class="status" id="tStatus"></div>
  </div>

  <div class="card">
    <div class="row" style="justify-content:space-between; margin-bottom:10px;">
      <h2 style="margin:0;">Objects</h2>
      <div class="row">
        <input id="prefix" type="text" placeholder="filter by prefix…" style="min-width:140px;" />
        <button class="mini" id="refreshBtn">Refresh</button>
      </div>
    </div>
    <div id="listWrap"><div class="empty">Loading…</div></div>
  </div>
</div>

<script>
const $ = (id) => document.getElementById(id);
const fmtSize = (n) => { if(n==null) return "—"; const u=["B","KB","MB","GB","TB"]; let i=0; while(n>=1024&&i<u.length-1){n/=1024;i++;} return n.toFixed(i?1:0)+" "+u[i]; };
const fmtDate = (d) => d ? new Date(d).toLocaleString() : "—";

async function loadFiles() {
  const prefix = $("prefix").value.trim();
  $("listWrap").innerHTML = '<div class="empty">Loading…</div>';
  try {
    const r = await fetch("/api/files" + (prefix ? "?prefix=" + encodeURIComponent(prefix) : ""));
    const d = await r.json();
    const objs = d.objects || [];
    if (!objs.length) { $("listWrap").innerHTML = '<div class="empty">No objects' + (prefix?' matching "'+prefix+'"':'') + '.</div>'; return; }
    objs.sort((a,b)=> new Date(b.uploaded)-new Date(a.uploaded));
    let html = '<table><thead><tr><th>Key</th><th>Size</th><th>Type</th><th>Uploaded</th><th></th></tr></thead><tbody>';
    for (const o of objs) {
      const k = o.key.replace(/&/g,"&amp;").replace(/</g,"&lt;");
      html += '<tr><td class="key">' + k + (o.source?'<br><span class="muted" style="font-size:11px;">↤ '+o.source+'</span>':'') + '</td>'
        + '<td class="nowrap">' + fmtSize(o.size) + '</td>'
        + '<td class="muted">' + (o.contentType||"—") + '</td>'
        + '<td class="muted nowrap">' + fmtDate(o.uploaded) + '</td>'
        + '<td class="nowrap"><a class="mini" href="/api/file?download=1&key=' + encodeURIComponent(o.key) + '">↓</a> '
        + '<button class="danger" data-key="' + encodeURIComponent(o.key) + '">Delete</button></td></tr>';
    }
    html += '</tbody></table>';
    if (d.truncated) html += '<div class="muted" style="margin-top:8px;">…more objects exist (showing first 1000).</div>';
    $("listWrap").innerHTML = html;
    document.querySelectorAll("button.danger").forEach((b) => b.addEventListener("click", () => del(b.dataset.key)));
  } catch (e) { $("listWrap").innerHTML = '<div class="empty">Error: ' + e.message + '</div>'; }
}

async function del(encKey) {
  const key = decodeURIComponent(encKey);
  if (!confirm('Delete "' + key + '"?')) return;
  await fetch("/api/file?key=" + encKey, { method: "DELETE" });
  loadFiles();
}

const drop = $("drop"), fileInput = $("fileInput");
drop.addEventListener("click", () => fileInput.click());
drop.addEventListener("dragover", (e) => { e.preventDefault(); drop.classList.add("drag"); });
drop.addEventListener("dragleave", () => drop.classList.remove("drag"));
drop.addEventListener("drop", (e) => { e.preventDefault(); drop.classList.remove("drag"); if (e.dataTransfer.files[0]) upload(e.dataTransfer.files[0]); });
fileInput.addEventListener("change", () => { if (fileInput.files[0]) upload(fileInput.files[0]); });

async function upload(file) {
  $("upStatus").textContent = "Uploading " + file.name + " (" + fmtSize(file.size) + ")…";
  try {
    const fd = new FormData(); fd.append("file", file); fd.append("key", file.name);
    const r = await fetch("/api/upload", { method: "POST", body: fd });
    const d = await r.json();
    if (d.error) throw new Error(d.error);
    $("upStatus").textContent = "✓ Uploaded " + d.key; loadFiles();
  } catch (e) { $("upStatus").textContent = "Error: " + e.message; }
}

$("transferBtn").addEventListener("click", async () => {
  const hf_url = $("hfUrl").value.trim(), r2_path = $("r2Path").value.trim();
  if (!hf_url || !r2_path) { $("tStatus").textContent = "Provide both a HuggingFace URL and an R2 path."; return; }
  $("tStatus").textContent = "Queuing…";
  try {
    const r = await fetch("/api/transfer", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ hf_url, r2_path }) });
    const d = await r.json();
    if (d.error) throw new Error(d.error);
    $("tStatus").textContent = "✓ " + d.message + " (job " + d.job_id + "). Refresh in a moment.";
  } catch (e) { $("tStatus").textContent = "Error: " + e.message; }
});

$("refreshBtn").addEventListener("click", loadFiles);
$("prefix").addEventListener("keydown", (e) => { if (e.key === "Enter") loadFiles(); });
loadFiles();
</script>
</body>
</html>
